services:
  # Layer 1: 交易Agent
  btc-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: btc-trading-agent
    restart: unless-stopped
    expose:
      - "8080"

    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-8497683014:AAEhTmi5fUA-FC3lF_wb7U3LU-U2e5SO8KE}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-6415396006}
      - OKX_API_KEY=${OKX_API_KEY:-bedc2600-1879-416a-9375-3c7a6c594c50}
      - OKX_API_SECRET=${OKX_API_SECRET:-F68A63AA108E8B6BC20BA58BF327F6A2}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE:-Bc887720.}

    # 数据持久化
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../reports:/app/reports
      - ../config:/app/config

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # 依赖网络
    networks:
      - agent-network

  # Layer 2: 监控Agent (简化版V2)
  monitor-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: btc-monitor-agent
    restart: always
    depends_on:
      - btc-agent

    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-8497683014:AAEhTmi5fUA-FC3lF_wb7U3LU-U2e5SO8KE}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-6415396006}

    # 不需要docker socket，只监控不重启
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../monitor:/app/monitor
      - ../config:/app/config

    # 工作目录
    working_dir: /app

    # 启动命令 - 使用简化版V2
    command: ["python", "monitor/monitor_agent_v2.py"]

    # 资源限制 (监控Agent资源需求较低)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

    networks:
      - agent-network

  # Layer 3: 定时汇总推送 (每天4次: 00:00, 06:00, 12:00, 18:00)
  summary-cron:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: btc-summary-cron
    restart: always

    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-8497683014:AAEhTmi5fUA-FC3lF_wb7U3LU-U2e5SO8KE}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-6415396006}

    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../tools:/app/tools
      - ../config:/app/config

    working_dir: /app

    # 使用cron定时执行: 每天0点、6点、12点、18点执行
    command: >
      sh -c "
        apt-get update && apt-get install -y cron &&
        echo '0 0,6,12,18 * * * cd /app && python tools/daily_summary.py >> /app/logs/summary_cron.log 2>&1' | crontab - &&
        cron -f
      "

    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
